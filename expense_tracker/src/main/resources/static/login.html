<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login - Fare Share</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">👤</div>
      <h2>LOGIN</h2>
      <form id="loginForm">
        <input id="loginEmail" class="form-input" placeholder="Email" type="email" required>
        <input id="loginPass" class="form-input" placeholder="Password" type="password" required>
        <button class="btn" type="submit">LOGIN</button>
        <div id="loginMsg"></div>
      </form>
      <a class="small-link" href="forgot.html">Forgot password?</a>
      <a class="small-link" href="register.html">New user? Register here</a>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
