<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>
    Reports & Analytics - Fare Share
  </title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <div class="wrap">

    <div class="card">

      <!-- Logo -->
      <img
        src="logojava.png"
        alt="Fare Share"
        class="logo"
      />

      <!-- Heading -->
      <h2>
        Reports & Analytics
      </h2>

      <!-- Welcome -->
      <p
        id="welcomeMsg"
        class="note"
      >
        Loading reports...
      </p>


      <!-- ========================= -->
      <!-- 📊 CHARTS -->
      <!-- ========================= -->

      <div class="card-grid">

        <!-- Pie Chart -->
        <div class="subcard">

          <h3>
            Category Breakdown
          </h3>

          <canvas id="categoryChart"></canvas>

        </div>


        <!-- Trend Chart -->
        <div class="subcard">

          <h3>
            Spending Trend
          </h3>

          <canvas id="trendChart"></canvas>

        </div>

      </div>


      <!-- ========================= -->
      <!-- 📋 TABLE -->
      <!-- ========================= -->

      <h3 style="margin-top:25px;">
        Expense Details
      </h3>

      <table
        class="data-table"
        id="expenseTable"
      >

        <thead>

          <tr>

            <th>Date</th>

            <th>Category</th>

            <th>Title</th>

            <th>Amount</th>

          </tr>

        </thead>

        <tbody>

        </tbody>

      </table>


      <!-- ========================= -->
      <!-- 🔗 QUICK LINKS -->
      <!-- ========================= -->

      <div
        class="quick-links"
        style="margin-top:25px;"
      >

        <a href="dashboard.html" class="btn-outline">
          🏠 Dashboard
        </a>

        <a href="addbill.html" class="btn-outline">
          ➕ Add Bill
        </a>

        <a href="personal.html" class="btn-outline">
          💰 Personal
        </a>

        <a href="group.html" class="btn-outline">
          👥 Groups
        </a>

      </div>


      <!-- ========================= -->
      <!-- 🚪 LOGOUT -->
      <!-- ========================= -->

      <button
        id="logoutBtn"
        class="btn"
        style="margin-top:20px;"
      >
        Logout
      </button>

      <p class="footer">

        Expense analytics powered by Fare Share.

      </p>

    </div>

  </div>

  <script src="reports.js"></script>

</body>
</html>
