<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Transaction History - Fare Share</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="wrap">

    <div class="card">

      <img
        src="logojava.png"
        alt="Fare Share"
        class="logo"
      >

      <h2>
        Transaction History
      </h2>

      <p id="userMsg" class="note">
        Loading history...
      </p>


      <!-- ======================= -->
      <!-- 📌 SUMMARY -->
      <!-- ======================= -->

      <div class="card-grid">

        <div class="subcard">
          <h4>Total Transactions</h4>
          <p id="totalTransactions">0</p>
        </div>

        <div class="subcard">
          <h4>Total Paid</h4>
          <p id="totalPaid">₹0</p>
        </div>

        <div class="subcard">
          <h4>Pending Settlements</h4>
          <p id="pendingCount">0</p>
        </div>

      </div>


      <!-- ======================= -->
      <!-- 📜 ACTIVITY FEED -->
      <!-- ======================= -->

      <h3 style="margin-top:25px;">
        Activity Feed
      </h3>

      <div
        id="activityFeed"
        class="group-list note"
      >
        No transactions yet.
      </div>


      <!-- ======================= -->
      <!-- 📋 TRANSACTION TABLE -->
      <!-- ======================= -->

      <h3 style="margin-top:25px;">
        Transaction Logs
      </h3>

      <table class="data-table">

        <thead>

          <tr>

            <th>Date</th>

            <th>Title</th>

            <th>Paid By</th>

            <th>Amount</th>

            <th>Status</th>

          </tr>

        </thead>

        <tbody id="historyTableBody">

        </tbody>

      </table>


      <!-- ======================= -->
      <!-- 🔗 NAVIGATION -->
      <!-- ======================= -->

      <div
        class="quick-links"
        style="margin-top:25px;"
      >

        <a href="dashboard.html" class="btn-outline">
          🏠 Dashboard
        </a>

        <a href="addbill.html" class="btn-outline">
          ➕ Add Bill
        </a>

        <a href="reports.html" class="btn-outline">
          📊 Reports
        </a>

        <a href="group.html" class="btn-outline">
          👥 Groups
        </a>
        <a href="dues.html" class="btn-outline">
          💳 Dues
        </a>

      </div>


      <p class="footer">
        Track all shared and personal transactions.
      </p>

    </div>

  </div>

  <script src="auth.js"></script>

  <script src="history.js"></script>

</body>
</html>
